server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__
      - source_labels: [__meta_docker_container_label_app_room]
        regex: 'true'
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - target_label: job
        replacement: docker
    pipeline_stages:
      - docker: {}

  - job_name: backend-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend
          __path__: /app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
      - output:
          source: msg
      - labels:
          level:
      - timestamp:
          source: ts
          format: RFC3339
