services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: room_backend
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  postgres:
    image: postgres:18
    container_name: room_postgres
    ports:
      - '${DB_PORT}:${DB_PORT}'
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_PORT: ${DB_PORT}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    command: ['postgres', '-c', 'port=${DB_PORT}']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p $$POSTGRES_PORT || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: room_redis
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    volumes:
      - redis_data:/data
    command: redis-server --port ${REDIS_PORT}
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '${REDIS_PORT}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: room_frontend
    ports:
      - '${FRONTEND_PORT}:${FRONTEND_PORT}'
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: room_loki
    ports:
      - '${LOKI_PORT}:${LOKI_PORT}'
    mem_limit: 2g
    cpus: 1
    volumes:
      - loki_data:/loki
      - loki_memberlist:/loki/memberlist
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: room_prometheus
    ports:
      - '${PROMETHEUS_PORT}:${PROMETHEUS_PORT}'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=24h'
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: room_grafana
    ports:
      - '${GRAFANA_PORT}:${GRAFANA_PORT}'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
    networks:
      - app-network
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: room_promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./backend/logs:/app/logs:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - app-network
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loki_data:
  loki_memberlist:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
